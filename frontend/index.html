<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiranex Enterprise Workspace</title>
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --accent-red: #ef4444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); margin-top: 40px; }
        h2 { margin-top: 0; font-size: 24px; font-weight: 700; color: #0f172a; text-align: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        .auth-box, .app-box { display: none; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input { padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--primary-hover); }
        .switch-mode { text-align: center; font-size: 14px; margin-top: 15px; color: #64748b; cursor: pointer; }
        .switch-mode span { color: var(--primary); font-weight: 600; }
        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #eff6ff; padding: 10px 15px; border-radius: 8px; font-size: 14px; }
        .logout-btn { background: transparent; color: var(--accent-red); padding: 0; font-size: 14px; cursor: pointer; }
        .logout-btn:hover { background: transparent; text-decoration: underline; }
        .task-input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .task-input-row input { flex: 1; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; }
        .task-text { font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .completed { text-decoration: line-through; color: #94a3b8; }
        .del-btn { background: #fee2e2; color: var(--accent-red); padding: 6px 12px; font-size: 13px; border-radius: 6px; }
        .del-btn:hover { background: #fca5a5; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-view" class="auth-box">
            <h2 id="auth-title">Welcome to Workspace</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button id="auth-submit-btn" onclick="handleAuth()">Log In</button>
            </div>
            <div class="switch-mode" id="auth-switch" onclick="toggleAuthMode()">Don't have an account? <span>Sign Up</span></div>
        </div>

        <div id="app-view" class="app-box">
            <h2>Task Dashboard</h2>
            <div class="user-bar">
                <span>Logged in as: <strong id="user-display"></strong></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div class="task-input-row">
                <input type="text" id="task-title" placeholder="What needs to be done?">
                <button onclick="addTask()">Add Task</button>
            </div>
            <div id="task-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
